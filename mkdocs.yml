site_name: HERO User Manual
site_description: Operational manual for HERO (Hasbro Enrichment & Reconciliation Optimizer) — UK pilot
site_url: https://enerbartoli.github.io/HERO/
docs_dir: docs

# Footer copyright (replaces the default "Made with Material for MkDocs")
copyright: >-
  © 2026 Hasbro. All rights reserved. All audio, visual and textual content
  on this site (including all names, characters, images, trademarks and logos)
  are protected by trademarks, copyrights and other Intellectual Property
  rights owned by Hasbro or its subsidiaries, licensors, licensees, suppliers
  and accounts.

extra:
  generator: false   # remove "Made with Material for MkDocs" footer note

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/img/hasbro-logo.png
  favicon: assets/img/favicon.png
  font: false                          # use Arial/system stack; no Proxima Nova license
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # navigation.sections removed (Prompt 4): chapters are now collapsible
    # groups with a chevron, not flat gray section labels.
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.tooltips
    - search.highlight
    - search.suggest

hooks:
  - hooks.py

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Program tools:
      - Prioritization Matrix: Priorization_Matrix/index.html
      - Module 1 — Knowledge Check: https://enerbartoli.github.io/mod1-knowledge-check/
  - Role-based guides:
      - Demand Planner: roles/demand-planner.md
      - Sales: roles/sales.md
      - Marketing / GPL: roles/marketing-gpl.md
  - Getting started:
      - What HERO is: getting-started/what-hero-is.md
      - Where HERO fits in the planning flow: getting-started/hero-in-the-cycle.md
      - Roles & permissions: getting-started/roles-permissions.md
  - Tools & templates:
      - HERO portal: tools/hero-portal.md
      - Enrichment Capture Template (ECT): tools/enrichment-capture-template.md
      - Forecast Reconciliation Template (FRT): tools/forecast-reconciliation-template.md
      - BU-SKU / Level 2.5 mode: tools/bu-sku-level-25-mode.md
      - Reference views & dashboards: tools/reference-views-dashboards.md
  - Workflows:
      - End-to-end workflow: workflows/end-to-end-workflow.md
      - Tab-by-tab walkthrough: workflows/tab-by-tab-walkthrough.md
      - Timing & system sync: workflows/timing-system-sync.md
      - Field-by-field reference: workflows/field-by-field-reference.md
  - Forecast Calculation Range & Disaggregation: workflows/forecast-range-calculation.md
  - Examples:
      - Calculation reference: examples/calculation-reference.md
      - BU-SKU worked examples: examples/bu-sku-worked-examples.md
  - Help & troubleshooting:
      - Validation & error catalogue: help/validation-error-catalogue.md
      - FAQ & common gotchas: help/faq-common-gotchas.md
      - Glossary: help/glossary.md
  - Reference:
      - Logility array & mart mapping: reference/logility-array-mart-mapping.md
      - Batch orchestration & updates: reference/batch-orchestration-updates.md
      - Deferred in v0: reference/deferred-in-v0.md
      - Documentation governance: reference/documentation-governance.md
  - Special Considerations During Pilot:
      - Data Transmission During Contingency: special-considerations/data-transmission-contingency.md
      - Rules for FCR Adjustment Within Cycle: special-considerations/fcr-adjustment-rules.md
