site_name: HERO User Manual
site_description: Operational manual for HERO (Hasbro Enrichment & Reconciliation Optimizer) — UK pilot
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: hero
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.suggest

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - toc:
      permalink: true

plugins:
  - search

# Links to pages not yet authored are kept in comments so they can be
# uncommented once the source documents are converted.
validation:
  links:
    not_found: ignore   # missing target pages documented in BUILD_NOTES.md

nav:
  - Home: index.md
  - Role-based guides:
      - Demand Planner: roles/demand-planner.md
      - Sales: roles/sales.md
      - Marketing / GPL: roles/marketing-gpl.md
  - Getting started:
      - What HERO is: getting-started/what-hero-is.md
      - Where HERO fits in the cycle: getting-started/hero-in-the-cycle.md
      - Roles & permissions: getting-started/roles-permissions.md
  - Tools & templates:
      - HERO portal: tools/hero-portal.md
      - Enrichment Capture Template (ECT): tools/enrichment-capture-template.md
      - Forecast Reconciliation Template (FRT): tools/forecast-reconciliation-template.md
      - BU-SKU / Level 2.5 mode: tools/bu-sku-level-25-mode.md
      - Reference views & dashboards: tools/reference-views-dashboards.md
