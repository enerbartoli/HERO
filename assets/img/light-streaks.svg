<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Diagonal light streaks texture">
  <!-- Generic diagonal light streaks evoking the Hasbro deck templates.
       White translucent bands; control overall strength via CSS opacity. -->
  <g transform="rotate(16 600 400)">
    <rect x="-200" y="-200" width="70"  height="1200" fill="#ffffff" opacity="0.10"/>
    <rect x="-60"  y="-200" width="40"  height="1200" fill="#ffffff" opacity="0.07"/>
    <rect x="120"  y="-200" width="110" height="1200" fill="#ffffff" opacity="0.06"/>
    <rect x="360"  y="-200" width="30"  height="1200" fill="#ffffff" opacity="0.09"/>
    <rect x="520"  y="-200" width="80"  height="1200" fill="#ffffff" opacity="0.05"/>
    <rect x="760"  y="-200" width="45"  height="1200" fill="#ffffff" opacity="0.07"/>
    <rect x="1000" y="-200" width="120" height="1200" fill="#ffffff" opacity="0.04"/>
  </g>
</svg>
